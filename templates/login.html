<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        .box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        button { width: 100%; padding: 10px; background: #3182ce; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .flash { margin-bottom: 15px; color: red; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="box">
        <h2>User Login</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %} <div class="flash">{{ messages[0] }}</div> {% endif %}
        {% endwith %}
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p style="text-align: center;"><a href="/">Back to Search</a></p>
    </div>
</body>
</html>
